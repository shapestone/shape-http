version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - revive
    - stylecheck
    - unconvert
    - unparam
  disable:
    - errcheck  # Too many unchecked errors, needs cleanup
    - gocritic  # Too many opinionated suggestions
    - gosec     # Security checks can be enabled later
    - prealloc  # Performance optimization can be done later
  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment  # Struct optimization can be done later
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - whyNoLint
        - unnamedResult
  exclusions:
    paths:
      - scripts
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - funlen
